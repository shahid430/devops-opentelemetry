        image: grafana/grafana:12.3
        name: grafana
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
          name: config
          subPath: grafana-datasources.yaml
      volumes:
      - configMap:
          name: grafana-datasources-dhhdd94276
