kind: ConfigMap
metadata:
  name: grafana-env-config-gc8h7g69c6
  namespace: observability
---
apiVersion: v1
data:
  loki-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
      chunk_idle_period: 5m
      chunk_retain_period: 30s
      wal:
        dir: /loki/wal

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/cache
      filesystem:
        directory: /loki/chunks

    limits_config:
      retention_period: 168h

    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      delete_request_store: filesystem
kind: ConfigMap
metadata:
  name: loki-config-494tb8bk5k
  namespace: observability
---
apiVersion: v1
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 512

    exporters:
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889
      otlphttp/loki:
        endpoint: http://loki:3100/otlp
        tls:
          insecure: true

    service:
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: '0.0.0.0'
                    port: 8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/loki]
kind: ConfigMap
metadata:
  name: otel-collector-config-7dt7c7md69
  namespace: observability
---
apiVersion: v1
data:
  prometheus-config.yaml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'loki'
        static_configs:
          - targets: ['loki:3100']
      - job_name: 'tempo'
        static_configs:
          - targets: ['tempo:3200']
      - job_name: 'grafana'
        static_configs:
          - targets: ['grafana:3000']
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8889']
      - job_name: 'otel-collector-internal'
        static_configs:
          - targets: ['otel-collector:8888']
      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter:9121']
kind: ConfigMap
metadata:
  name: prometheus-config-7kff2777t2
  namespace: observability
---
apiVersion: v1
data:
  tempo-config.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    query_frontend:
      search:
        max_duration: 0s
    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 72h
