# Built-in upstream values placeholder for grafana/tempo.
# Do not edit this file for environment-specific changes.
# Keep AKS/repository-specific overrides in custom-values.yaml.
#
# To refresh this file with the full upstream built-in values:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm show values grafana/tempo > observability/charts/tempo/values.yaml
#
# Install using:
#   helm upgrade --install tempo grafana/tempo \
#     --namespace observability \
#     --values observability/charts/tempo/custom-values.yaml
