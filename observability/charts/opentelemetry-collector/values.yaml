# Built-in upstream values placeholder for open-telemetry/opentelemetry-collector.
# Do not edit this file for environment-specific changes.
# Keep AKS/repository-specific overrides in custom-values.yaml.
#
# To refresh this file with the full upstream built-in values:
#   helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
#   helm repo update
#   helm show values open-telemetry/opentelemetry-collector > observability/charts/opentelemetry-collector/values.yaml
#
# Install using:
#   helm upgrade --install opentelemetry-collector open-telemetry/opentelemetry-collector \
#     --namespace observability \
#     --values observability/charts/opentelemetry-collector/custom-values.yaml
