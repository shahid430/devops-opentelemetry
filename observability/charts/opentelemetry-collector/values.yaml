# opentelemetry-collector custom values for AKS
# Official chart: open-telemetry/opentelemetry-collector
# Based on existing manifest: OTLP receiver on 4317/4318, Prometheus exporter on 8889, internal metrics on 8888, Tempo and Loki exporters.

fullnameOverride: opentelemetry-collector

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: 0.146.1

replicaCount: 1

service:
  type: ClusterIP

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP
  internal-metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics
      interval: 15s
    - port: internal-metrics
      interval: 15s

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    memory_limiter:
      check_interval: 1s
      limit_mib: 512
    batch:
      timeout: 10s
      send_batch_size: 1024

  exporters:
    otlp/tempo:
      endpoint: tempo.observability.svc.cluster.local:4317
      tls:
        insecure: true

    prometheus:
      endpoint: 0.0.0.0:8889

    otlphttp/loki:
      endpoint: http://loki-distributed-gateway.observability.svc.cluster.local/otlp
      tls:
        insecure: true

    debug:
      verbosity: basic

  service:
    telemetry:
      metrics:
        readers:
          - pull:
              exporter:
                prometheus:
                  host: 0.0.0.0
                  port: 8888
    pipelines:
      traces:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
        exporters:
          - otlp/tempo
      metrics:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
        exporters:
          - prometheus
      logs:
        receivers:
          - otlp
        processors:
          - memory_limiter
          - batch
        exporters:
          - otlphttp/loki
