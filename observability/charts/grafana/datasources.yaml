apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-additional-datasources
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: 15s
          httpMethod: POST

      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-distributed-gateway.observability.svc.cluster.local
        editable: false
        jsonData:
          maxLines: 1000
          derivedFields:
            - name: Trace ID
              matcherType: label
              matcherRegex: trace_id
              datasourceUid: tempo
              url: '$${__value.raw}'
              urlDisplayLabel: Trace ID

      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.observability.svc.cluster.local:3200
        editable: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
            tags:
              - key: service.name
                value: service_name
          tracesToMetrics:
            datasourceUid: prometheus
          serviceMap:
            datasourceUid: prometheus
