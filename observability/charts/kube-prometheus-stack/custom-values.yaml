# Custom values for prometheus-community/kube-prometheus-stack
# Repository-specific overrides based on the original observability manifests.

fullnameOverride: kube-prometheus-stack

crds:
  enabled: true

defaultRules:
  create: true

grafana:
  enabled: true

  adminUser: admin
  adminPassword: admin

  env:
    GF_AUTH_ANONYMOUS_ENABLED: "true"
    GF_AUTH_ANONYMOUS_ORG_ROLE: Admin

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: false

  persistence:
    enabled: false

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
      searchNamespace: ALL

prometheus:
  enabled: true

  service:
    type: ClusterIP
    port: 9090

  prometheusSpec:
    retention: 15d
    scrapeInterval: 15s
    evaluationInterval: 15s
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}

    additionalScrapeConfigs:
      - job_name: loki
        static_configs:
          - targets:
              - loki-distributed-gateway.observability.svc.cluster.local:80
      - job_name: tempo
        static_configs:
          - targets:
              - tempo.observability.svc.cluster.local:3200
      - job_name: grafana
        static_configs:
          - targets:
              - kube-prometheus-stack-grafana.observability.svc.cluster.local:3000
      - job_name: otel-collector
        static_configs:
          - targets:
              - opentelemetry-collector.observability.svc.cluster.local:8889
      - job_name: otel-collector-internal
        static_configs:
          - targets:
              - opentelemetry-collector.observability.svc.cluster.local:8888

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

alertmanager:
  enabled: true

kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: true

prometheusOperator:
  enabled: true

kubernetesServiceMonitors:
  enabled: true
