# Built-in upstream values placeholder for grafana/loki-distributed.
# Do not edit this file for environment-specific changes.
# Keep AKS/repository-specific overrides in custom-values.yaml.
#
# To refresh this file with the full upstream built-in values:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm show values grafana/loki-distributed > observability/charts/loki-distributed/values.yaml
