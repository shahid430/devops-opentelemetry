global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'loki'
    static_configs:
      - targets: ['loki.observability.svc.cluster.local:3100']
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo.observability.svc.cluster.local:3200']
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana.observability.svc.cluster.local:3000']
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector.observability.svc.cluster.local:8889']
  - job_name: 'otel-collector-internal'
    static_configs:
      - targets: ['otel-collector.observability.svc.cluster.local:8888']
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter.app.svc.cluster.local:9121']
  - job_name: 'kube-state-metrics'
    static_configs:
      - targets: ['kube-state-metrics.observability.svc.cluster.local:8080']